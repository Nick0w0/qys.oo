<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Discover_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-discover_id" data-rule="required" data-source="discover/discover/index" data-field="title" class="form-control selectpage" name="row[discover_id]" type="text" value="{$row.discover_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Content')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-content" data-rule="required" class="form-control" name="row[content]" type="text" value="{$row.content|htmlentities}">{$row.content|htmlentities}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('User_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-user_id" data-rule="required" data-source="user/user/index" data-field="nickname" class="form-control selectpage" name="row[user_id]" type="text" value="{$row.user_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Comment_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-comment_id" data-rule="required" data-source="discover/comment/index" data-field="content"  class="form-control selectpage" name="row[comment_id]" type="text" value="{$row.comment_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Reply_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-reply_id" data-rule="required" data-source="user/user/index" data-field="nickname"class="form-control selectpage" name="row[reply_id]" type="text" value="{$row.reply_id|htmlentities}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Statusdata')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="statusdataList" item="vo"}
            <label for="row[statusdata]-{$key|htmlentities}"><input id="row[statusdata]-{$key|htmlentities}" name="row[statusdata]" type="radio" value="{$key|htmlentities}" {in name="key" value="$row.statusdata"}checked{/in} /> {$vo|htmlentities}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
